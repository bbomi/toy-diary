<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>daily bomi</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@300;400;700&family=Nanum+Pen+Script&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <!-- 잠금 화면 -->
    <div id="lockScreen" class="lock-screen">
        <div class="lock-box">
            <div class="lock-icon">🔒</div>
            <h2 class="lock-title">daily bomi</h2>
            <div class="pin-dots" id="pinDots">
                <span class="dot"></span>
                <span class="dot"></span>
                <span class="dot"></span>
                <span class="dot"></span>
            </div>
            <p class="lock-error" id="lockError"></p>
            <div class="pin-pad">
                <button class="pin-key" onclick="pressKey('1')">1</button>
                <button class="pin-key" onclick="pressKey('2')">2</button>
                <button class="pin-key" onclick="pressKey('3')">3</button>
                <button class="pin-key" onclick="pressKey('4')">4</button>
                <button class="pin-key" onclick="pressKey('5')">5</button>
                <button class="pin-key" onclick="pressKey('6')">6</button>
                <button class="pin-key" onclick="pressKey('7')">7</button>
                <button class="pin-key" onclick="pressKey('8')">8</button>
                <button class="pin-key" onclick="pressKey('9')">9</button>
                <button class="pin-key" disabled></button>
                <button class="pin-key" onclick="pressKey('0')">0</button>
                <button class="pin-key pin-del" onclick="pressDelete()">⌫</button>
            </div>
        </div>
    </div>

    <!-- 메인 앱 (인증 후 표시) -->
    <div id="mainApp" style="display:none">
        <header>
            <h1 class="logo" onclick="location.hash='#/'">daily bomi</h1>
        </header>
        <main id="app"></main>
    </div>

    <script src="/static/js/auth.js"></script>
    <script src="/static/js/app.js"></script>
    <script src="/static/js/calendar.js"></script>
    <script src="/static/js/editor.js"></script>
    <script src="/static/js/viewer.js"></script>
    <script src="/static/js/hashtags.js"></script>
</body>
</html>
